services:
  postgres:
    image: postgres:16-alpine
    container_name: db-bot-postgres
    command:
      [
        "postgres",
        "-c",
        "timezone=${TZ:-Asia/Seoul}",
        "-c",
        "log_timezone=${TZ:-Asia/Seoul}",
      ]
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-secrets/.env}
    environment:
      TZ: ${TZ:-Asia/Seoul}
      PGTZ: ${TZ:-Asia/Seoul}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
